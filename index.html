<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--sidebar-bg:#1e1e1e;--sidebar-w:280px;--main-bg:#212121;--input-bg:#2f2f2f;
--user-bubble:#3a3a3a;--text:#ececec;--text-muted:#8e8e8e;--accent:#d4a574;
--border:#353535;--hover:#2a2a2a;--active:#333;--danger:#e74c3c;--scroll-thumb:#444;
--incognito:#9b59b6;--card-bg:#2a2a2a;--svg-bg:#1a1a1a;--svg-border:#404040;
}
[data-theme="light"]{
--sidebar-bg:#f0f0f0;--main-bg:#ffffff;--input-bg:#f5f5f5;
--user-bubble:#e8e8e8;--text:#1a1a1a;--text-muted:#666;--accent:#b8733a;
--border:#ddd;--hover:#e8e8e8;--active:#ddd;--scroll-thumb:#bbb;--card-bg:#f0f0f0;
--svg-bg:#f8f8f8;--svg-border:#ccc;
}
[data-theme="amoled"]{
--sidebar-bg:#000;--main-bg:#000;--input-bg:#111;
--user-bubble:#1a1a1a;--text:#e0e0e0;--text-muted:#777;--accent:#d4a574;
--border:#222;--hover:#111;--active:#1a1a1a;--scroll-thumb:#333;--card-bg:#111;
--svg-bg:#0a0a0a;--svg-border:#333;
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--main-bg);color:var(--text);font-size:14px;line-height:1.5;transition:background .3s,color .3s}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:3px}
a{color:var(--accent);text-decoration:none}button{font-family:inherit;cursor:pointer;border:none;background:none;color:var(--text);font-size:14px}
input,textarea,select{font-family:inherit;font-size:14px;color:var(--text);background:transparent;border:none;outline:none}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--sidebar-bg);display:flex;flex-direction:column;border-right:1px solid var(--border);transition:margin-left .3s,min-width .3s,width .3s,background .3s;overflow:hidden;position:relative;z-index:20}
.sidebar.collapsed{margin-left:calc(-1*var(--sidebar-w));min-width:0;width:0;border:none}
.sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 8px;flex-shrink:0}
.sidebar-header h1{font-size:18px;font-weight:700}
.ib{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:background .15s;color:var(--text-muted)}
.ib:hover{background:var(--hover);color:var(--text)}
.ib svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.sidebar-nav{padding:4px 8px;flex-shrink:0}
.ni{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .15s;font-size:14px;color:var(--text-muted);white-space:nowrap}
.ni:hover{background:var(--hover);color:var(--text)}
.ni svg{width:18px;height:18px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.8}
.ni.incog{color:var(--incognito)}.ni.incog:hover{background:rgba(155,89,182,.12)}
.ni.persona-ni{font-size:13px;color:var(--accent)}
.ni.persona-ni.active-p{background:rgba(212,165,116,.12)}
.sdiv{height:1px;background:var(--border);margin:4px 16px}
.ssec{padding:0 8px;flex-shrink:0}
.ssh{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;padding:12px 10px 4px}
.clist{flex:1;overflow-y:auto;padding:0 8px 8px;min-height:0}
.ci{display:flex;align-items:center;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .15s}
.ci:hover{background:var(--hover)}.ci.active{background:var(--active)}
.ci-t{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;color:var(--text-muted)}
.ci.active .ci-t,.ci:hover .ci-t{color:var(--text)}
.ci-m{opacity:0;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;flex-shrink:0}
.ci:hover .ci-m{opacity:1}.ci-m:hover{background:var(--border)}
.star-i{color:var(--accent);margin-right:4px;font-size:12px;flex-shrink:0}
.sprofile{padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0;position:relative}
.sprofile:hover{background:var(--hover)}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;color:#1e1e1e;flex-shrink:0;text-transform:uppercase}
.pname{font-size:13px;font-weight:500}
.pflyout{position:absolute;bottom:100%;left:8px;width:220px;background:var(--card-bg);border-radius:12px;border:1px solid var(--border);padding:6px;display:none;box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:100}
.pflyout.show{display:block;animation:fu .15s ease}
.fi{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text-muted)}
.fi:hover{background:var(--hover);color:var(--text)}
.fi svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8}
.fdiv{height:1px;background:var(--border);margin:4px 0}
.inc-banner{display:flex;align-items:center;gap:8px;padding:8px 16px;background:rgba(155,89,182,.12);border-bottom:1px solid rgba(155,89,182,.25);font-size:13px;color:var(--incognito);flex-shrink:0}
.inc-banner .end-btn{margin-left:auto;padding:4px 12px;border-radius:6px;font-size:12px;color:var(--incognito);border:1px solid rgba(155,89,182,.3)}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;transition:background .3s}
.topbar{height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0}
.tbt{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px;font-weight:500}
.tbt svg{width:16px;height:16px;stroke:var(--text-muted);fill:none;stroke-width:2}
.sidebar-open{position:fixed;top:12px;left:12px;z-index:15;display:none}
.sidebar.collapsed~.main .sidebar-open{display:flex}
#contentArea{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;overflow-y:auto}
.sparkle{width:48px;height:48px;position:relative;margin-bottom:16px;flex-shrink:0}
.sparkle .p{position:absolute;width:8px;height:20px;border-radius:4px;top:50%;left:50%;transform-origin:center 0;animation:sp 8s linear infinite}
.sparkle .p:nth-child(1){background:#c47a5a;transform:translate(-50%,-100%) rotate(0deg)}
.sparkle .p:nth-child(2){background:#d4a574;transform:translate(-50%,-100%) rotate(45deg);animation-delay:-1s}
.sparkle .p:nth-child(3){background:#8fbc8f;transform:translate(-50%,-100%) rotate(90deg);animation-delay:-2s}
.sparkle .p:nth-child(4){background:#c47a5a;transform:translate(-50%,-100%) rotate(135deg);animation-delay:-3s}
.sparkle .p:nth-child(5){background:#d4a574;transform:translate(-50%,-100%) rotate(180deg);animation-delay:-4s}
.sparkle .p:nth-child(6){background:#8fbc8f;transform:translate(-50%,-100%) rotate(225deg);animation-delay:-5s}
.sparkle .p:nth-child(7){background:#c47a5a;transform:translate(-50%,-100%) rotate(270deg);animation-delay:-6s}
.sparkle .p:nth-child(8){background:#d4a574;transform:translate(-50%,-100%) rotate(315deg);animation-delay:-7s}
@keyframes sp{0%{opacity:.6}50%{opacity:1}100%{opacity:.6}}
.welcome h2{font-family:Georgia,serif;font-size:32px;font-weight:400;margin-bottom:32px;flex-shrink:0}
.pills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px;flex-shrink:0}
.pill{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:20px;border:1px solid var(--border);font-size:13px;color:var(--text-muted);cursor:pointer}
.pill:hover{border-color:var(--text-muted);color:var(--text)}
.pill svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8}
.chat-w{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.chat-area{flex:1;overflow-y:auto;padding:20px 20px 0;min-height:0}
.msgs{max-width:768px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:24px;padding-bottom:24px}
.msg{display:flex;flex-direction:column;animation:mi .3s ease}
@keyframes mi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.mu{align-items:flex-end}
.mu .mc{background:var(--user-bubble);padding:12px 16px;border-radius:18px 18px 4px 18px;max-width:75%;word-wrap:break-word}
.mu .miw{display:flex;gap:8px;margin-bottom:8px;justify-content:flex-end;flex-wrap:wrap}
.mu .miw img{max-height:200px;max-width:250px;border-radius:12px;cursor:pointer;object-fit:cover}
.ma{align-items:flex-start}.ma .mb{max-width:100%}
.ma .mc{line-height:1.6;font-size:14.5px}
.ma .mc p{margin-bottom:12px}.ma .mc p:last-child{margin-bottom:0}
.ma .mc h1,.ma .mc h2,.ma .mc h3{margin:20px 0 10px;font-weight:600}
.ma .mc h1{font-size:24px}.ma .mc h2{font-size:20px}.ma .mc h3{font-size:17px}
.ma .mc ul,.ma .mc ol{margin:8px 0;padding-left:24px}.ma .mc li{margin:4px 0}
.ma .mc blockquote{border-left:3px solid var(--accent);padding:8px 16px;margin:12px 0;color:var(--text-muted);background:rgba(128,128,128,.06);border-radius:0 8px 8px 0}
.ma .mc a{color:var(--accent);text-decoration:underline}
.ma .mc strong{font-weight:600}
.ma .mc hr{border:none;height:1px;background:var(--border);margin:16px 0}
.ma .mc code:not(.cb code){background:var(--user-bubble);padding:2px 6px;border-radius:4px;font-size:13px;font-family:'SF Mono',Monaco,Consolas,monospace}
.ma .mc table{border-collapse:collapse;width:100%;margin:12px 0;font-size:13px;display:block;overflow-x:auto}
.ma .mc th,.ma .mc td{padding:8px 12px;border:1px solid var(--border);text-align:left}
.ma .mc th{background:var(--user-bubble);font-weight:600}
.cb{position:relative;margin:12px 0;border-radius:10px;overflow:hidden;background:#161616;border:1px solid var(--border)}
.ch{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#1a1a1a;font-size:12px;color:var(--text-muted);border-bottom:1px solid var(--border)}
.ccb{padding:4px 10px;border-radius:6px;font-size:12px;color:var(--text-muted);cursor:pointer}
.ccb:hover{background:var(--hover);color:var(--text)}
.cb pre{margin:0;padding:14px;overflow-x:auto;font-size:13px;line-height:1.5}
.cb code{font-family:'SF Mono',Monaco,Consolas,monospace}
/* SVG render - theme-aware */
.svg-render{margin:12px 0;background:var(--svg-bg);border-radius:12px;padding:20px;border:2px solid var(--svg-border);text-align:center;overflow:hidden;position:relative}
.svg-render svg{max-width:100%;height:auto;display:inline-block}
.svg-render .svg-dl{position:absolute;top:8px;right:8px;padding:4px 10px;border-radius:6px;font-size:11px;background:var(--card-bg);border:1px solid var(--border);color:var(--text-muted);cursor:pointer;opacity:0;transition:opacity .15s}
.svg-render:hover .svg-dl{opacity:1}
.svg-render .svg-dl:hover{color:var(--text);background:var(--hover)}
.iblock{margin:12px 0;padding:16px;border-radius:12px;background:var(--card-bg);border:1px solid var(--border)}
.iblock h4{font-size:15px;margin-bottom:12px}
.mcq-o,.poll-o{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:all .15s;font-size:13px}
.mcq-o:hover,.poll-o:hover{border-color:var(--accent);background:rgba(212,165,116,.06)}
.mcq-o.sel{border-color:var(--accent);background:rgba(212,165,116,.1)}
.mcq-o.ok{border-color:#2ecc71;background:rgba(46,204,113,.1)}
.mcq-o.no{border-color:#e74c3c;background:rgba(231,76,60,.1)}
.mcq-r{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0}
.mcq-o.sel .mcq-r,.mcq-o.ok .mcq-r{border-color:var(--accent);background:var(--accent)}
.mcq-o.no .mcq-r{border-color:#e74c3c;background:#e74c3c}
.mcq-res{margin-top:10px;padding:10px;border-radius:8px;font-size:13px;font-weight:500}
.mcq-res.ok{background:rgba(46,204,113,.1);color:#2ecc71}
.mcq-res.no{background:rgba(231,76,60,.1);color:#e74c3c}
.poll-bar{height:24px;border-radius:6px;background:var(--hover);margin-top:4px;overflow:hidden}
.poll-fill{height:100%;border-radius:6px;background:var(--accent);transition:width .5s;display:flex;align-items:center;padding:0 8px;font-size:11px;color:#1e1e1e;font-weight:600}
.fups{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.fup{padding:8px 14px;border-radius:20px;border:1px solid var(--border);font-size:13px;color:var(--accent);cursor:pointer;background:transparent;text-align:left}
.fup:hover{background:rgba(212,165,116,.1);border-color:var(--accent)}
.thb{margin-bottom:16px;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.thb summary{padding:10px 14px;cursor:pointer;font-size:13px;color:var(--text-muted);background:rgba(128,128,128,.05)}
.thb .thc{padding:12px 14px;font-size:13px;color:var(--text-muted);border-top:1px solid var(--border);white-space:pre-wrap;max-height:300px;overflow-y:auto}
.ths{margin-bottom:12px;padding:12px 16px;border-radius:10px;background:rgba(212,165,116,.06);border:1px solid rgba(212,165,116,.15)}
.thstep{display:flex;align-items:flex-start;gap:8px;padding:4px 0;font-size:13px;animation:si .3s ease}
.thstep .si{flex-shrink:0;margin-top:2px;color:var(--accent)}
.thstep .st{flex:1;color:var(--text-muted)}
.thstep.active .st{color:var(--accent)}
@keyframes si{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.mact{display:flex;gap:2px;margin-top:8px;opacity:0;transition:opacity .15s}
.msg:hover .mact{opacity:1}
.mab{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;color:var(--text-muted)}
.mab:hover{background:var(--hover);color:var(--text)}
.mab svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.typing{display:flex;gap:4px;padding:12px 0}
.td{width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:tp 1.4s infinite}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes tp{0%,60%,100%{opacity:.3}30%{opacity:1}}
.cblink{display:inline-block;width:2px;height:16px;background:var(--text);animation:bl 1s step-end infinite;vertical-align:text-bottom;margin-left:2px}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}
.stop{align-self:center;padding:8px 16px;border-radius:20px;background:var(--user-bubble);color:var(--text);font-size:13px;cursor:pointer;margin-top:8px;border:1px solid var(--border)}
.stop:hover{background:var(--hover)}
.ibw{flex-shrink:0;padding:12px 20px;background:linear-gradient(transparent,var(--main-bg) 16px);padding-top:24px;position:relative;z-index:10}
.ibar{max-width:768px;margin:0 auto;background:var(--input-bg);border-radius:16px;border:1px solid var(--border);overflow:visible;position:relative;transition:background .3s,border-color .15s}
.ibar:focus-within{border-color:var(--accent)}
.iprev{display:flex;gap:8px;padding:12px 16px 0;flex-wrap:wrap}
.ipv{position:relative}.ipv img{height:64px;width:64px;object-fit:cover;border-radius:8px;border:1px solid var(--border)}
.ipv .rx{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#555;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;border:2px solid var(--input-bg)}
.itw{padding:12px 16px 4px}
.ita{width:100%;resize:none;font-size:15px;min-height:24px;max-height:200px;background:transparent;color:var(--text);line-height:1.5}
.ita::placeholder{color:var(--text-muted)}
.ibot{display:flex;align-items:center;justify-content:space-between;padding:4px 10px 10px}
.ir{display:flex;align-items:center;gap:4px}
.disc{text-align:center;padding:4px 0 2px;font-size:11px;color:var(--text-muted);max-width:768px;margin:0 auto}
.mba{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:13px;color:var(--text-muted);cursor:pointer;position:relative}
.mba:hover{background:var(--hover);color:var(--text)}
.mba svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.ext-b{font-size:11px;color:var(--accent);font-weight:500;margin-left:2px}
.sendb{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text-muted)}
.sendb:hover{background:var(--hover);color:var(--text)}
.sendb.has{background:var(--accent);color:#1e1e1e}
.sendb svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.plusb{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text-muted);position:relative}
.plusb:hover{background:var(--hover)}
.pmenu{position:absolute;bottom:calc(100% + 8px);left:0;width:250px;background:var(--card-bg);border-radius:12px;border:1px solid var(--border);padding:6px;display:none;box-shadow:0 -8px 32px rgba(0,0,0,.3);z-index:60}
.pmenu.show{display:block;animation:fu .15s ease}
@keyframes fu{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.pmi{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text-muted)}
.pmi:hover{background:var(--hover);color:var(--text)}
.pmi svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0}
.pmi .left{display:flex;align-items:center;gap:10px}
.ssub{position:absolute;bottom:0;left:calc(100% + 4px);width:220px;background:var(--card-bg);border-radius:12px;border:1px solid var(--border);padding:6px;box-shadow:0 -8px 32px rgba(0,0,0,.3);display:none;max-height:380px;overflow-y:auto}
.ssub.show{display:block;animation:fu .12s ease}
.sopt{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text-muted)}
.sopt:hover{background:var(--hover);color:var(--text)}.sopt.active{color:var(--accent)}
.mdd{position:absolute;bottom:calc(100% + 8px);right:0;width:280px;background:var(--card-bg);border-radius:12px;border:1px solid var(--border);padding:6px;display:none;box-shadow:0 -8px 32px rgba(0,0,0,.3);z-index:60;max-height:420px;overflow-y:auto}
.mdd.show{display:block;animation:fu .15s ease}
.mdd .ncl{display:block;padding:10px 12px;font-size:13px;color:var(--accent);cursor:pointer;border-bottom:1px solid var(--border);margin-bottom:4px}
.mo{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:8px;cursor:pointer}
.mo:hover{background:var(--hover)}.mo.active{background:var(--active)}
.mo .mi{flex:1;min-width:0}.mo .mn{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mo .md{font-size:11px;color:var(--text-muted);margin-top:2px}
.mo .ck{color:#6dbe6d;font-size:16px;margin-left:8px;flex-shrink:0}
.tt{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-top:1px solid var(--border);margin-top:4px}
.tt .ti{flex:1}.tt .tl{font-size:13px;font-weight:500}.tt .td2{font-size:11px;color:var(--text-muted);margin-top:2px}
.tog{width:40px;height:22px;border-radius:11px;background:#555;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.tog.on{background:#5b8dd9}
.tog::after{content:'';width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:transform .2s}
.tog.on::after{transform:translateX(18px)}

const STYLES=[{id:'default',name:'Normal',icon:'💬',prompt:''},{id:'concise',name:'Concise',icon:'⚡',prompt:'Be concise.'},{id:'bullet',name:'Bullets',icon:'📋',prompt:'Use bullet points.'},{id:'formal',name:'Formal',icon:'🎩',prompt:'Formal language.'},{id:'informal',name:'Casual',icon:'😊',prompt:'Casual tone.'},{id:'detailed',name:'Detailed',icon:'📖',prompt:'Be thorough.'},{id:'eli5',name:'ELI5',icon:'🧒',prompt:'Explain simply.'},{id:'step',name:'Steps',icon:'🔢',prompt:'Numbered steps.'}];
const FM='<<FOLLOWUPS>>',FE='<</FOLLOWUPS>>';
const LS=k=>localStorage.getItem(k),SS=(k,v)=>localStorage.setItem(k,v);
const DEFAULT_SKILLS=[
{id:'sk_chem',name:'Chemistry SVG',icon:'⚗️',desc:'Render chemical structures, reactions, Lewis dot structures and orbital diagrams as clean SVGs with proper bond angles, element colors and labels.',prompt:'When drawing chemistry: use proper bond angles (120° for sp2, 109.5° for sp3). Color atoms: C=#333, O=#e74c3c, N=#3498db, H=#999, Cl=#2ecc71, S=#f1c40f. Show lone pairs as dots. Use wedge/dash for 3D. Label atoms clearly.',enabled:true,builtin:true},
{id:'sk_math',name:'Math Diagrams',icon:'📐',desc:'Create geometric diagrams, graphs, coordinate planes, and function plots as SVGs with labels, grid lines and color coding.',prompt:'When drawing math: use a coordinate grid with labeled axes. Plot points clearly. Use colors: axes=#888, grid=#ddd, functions=distinct bright colors. Label all key points, intercepts, asymptotes.',enabled:true,builtin:true},
{id:'sk_flow',name:'Flowcharts',icon:'🔀',desc:'Create process flowcharts, decision trees and workflow diagrams as clean SVGs with proper shapes and connections.',prompt:'When drawing flowcharts: use rounded rectangles for processes, diamonds for decisions, ovals for start/end. Use arrows with labels. Color code: start=#2ecc71, process=#3498db, decision=#f39c12, end=#e74c3c.',enabled:true,builtin:true},
{id:'sk_bio',name:'Biology Diagrams',icon:'🧬',desc:'Render cell structures, anatomical diagrams, DNA/protein structures and biological processes as detailed SVGs.',prompt:'When drawing biology: use realistic proportions. Color membranes in yellow/gold, nucleus in purple, mitochondria in red/orange, chloroplasts in green. Label all organelles and structures clearly.',enabled:true,builtin:true},
];
const S={apiKey:LS('gk')||'',availableModels:JSON.parse(LS('gm')||'[]'),selectedModels:JSON.parse(LS('gs')||'[]'),activeModel:LS('ga')||'',conversations:JSON.parse(LS('gc')||'[]'),currentConvId:null,settings:JSON.parse(LS('gset')||JSON.stringify({username:'User',extendedThinking:false,style:'default',customInstructions:'',theme:'dark',activePersona:null})),personas:JSON.parse(LS('gp')||'[]'),skills:JSON.parse(LS('gsk')||JSON.stringify(DEFAULT_SKILLS)),isStreaming:false,abortController:null,attachedImages:[],contextConvId:null,incognito:false,incognitoConv:null};

function init(){applyTheme(S.settings.theme||'dark');if(!S.apiKey)return showKeyModal();if(!S.selectedModels.length){if(!S.availableModels.length)fetchModels().then(()=>showPickModal());else showPickModal();return}if(!S.activeModel)S.activeModel=S.selectedModels[0];renderApp()}
const API='https://generativelanguage.googleapis.com/v1beta';
async function fetchModels(){try{const r=await fetch(`${API}/models?key=${S.apiKey}`);if(!r.ok){toast('Invalid key','error');throw''}const d=await r.json();S.availableModels=(d.models||[]).filter(m=>m.supportedGenerationMethods?.includes('generateContent')).map(m=>({id:m.name.replace('models/',''),name:m.displayName||m.name.replace('models/',''),desc:(m.description||'').substring(0,80)})).sort((a,b)=>a.name.localeCompare(b.name));save()}catch(e){console.error(e)}}
const SAFETY=[{category:"HARM_CATEGORY_HARASSMENT",threshold:"BLOCK_NONE"},{category:"HARM_CATEGORY_HATE_SPEECH",threshold:"BLOCK_NONE"},{category:"HARM_CATEGORY_SEXUALLY_EXPLICIT",threshold:"BLOCK_NONE"},{category:"HARM_CATEGORY_DANGEROUS_CONTENT",threshold:"BLOCK_NONE"},{category:"HARM_CATEGORY_CIVIC_INTEGRITY",threshold:"BLOCK_NONE"}];
async function callG(model,contents,stream,onC,signal){const body={contents,generationConfig:{maxOutputTokens:8192},safetySettings:SAFETY};if(stream){const r=await fetch(`${API}/models/${model}:streamGenerateContent?alt=sse&key=${S.apiKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),signal});if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`Error ${r.status}`)}const rd=r.body.getReader(),dc=new TextDecoder();let bf='',fl='';while(true){const{done,value}=await rd.read();if(done)break;bf+=dc.decode(value,{stream:true});const ls=bf.split('\n');bf=ls.pop();for(const l of ls){if(!l.startsWith('data: '))continue;const j=l.slice(6).trim();if(j==='[DONE]')continue;try{(JSON.parse(j).candidates?.[0]?.content?.parts||[]).forEach(p=>{if(p.text){fl+=p.text;onC?.(fl)}})}catch{}}}return fl}else{const r=await fetch(`${API}/models/${model}:generateContent?key=${S.apiKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),signal});if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`Error ${r.status}`)}return(await r.json()).candidates?.[0]?.content?.parts?.map(p=>p.text||'').join('')||''}}
async function genTitle(u){try{return(await callG(S.activeModel,[{role:'user',parts:[{text:`Short title (max 6 words) for:"${u.substring(0,200)}". ONLY title.`}]}],false)).trim().replace(/^["']|["']$/g,'')||'New chat'}catch{return'New chat'}}
function buildSys(){let s=[];const p=S.personas.find(x=>x.id===S.settings.activePersona);if(p)s.push(`[You are: ${p.name}. ${p.instructions}]`);const ci=S.settings.customInstructions?.trim();if(ci)s.push(`[User context: ${ci}]`);const st=STYLES.find(x=>x.id===S.settings.style);if(st?.prompt)s.push(`[Style: ${st.prompt}]`);
// Skills

function renderMD(text){if(!text)return'';const mm=[],mcqs=[],polls=[],games=[];text=text.replace(/```mermaid\n([\s\S]*?)```/g,(_,c)=>{mm.push(c.trim());return`%%MER_${mm.length-1}%%`});text=text.replace(/```mcq\n([\s\S]*?)```/g,(_,c)=>{mcqs.push(c.trim());return`%%MCQ_${mcqs.length-1}%%`});text=text.replace(/```poll\n([\s\S]*?)```/g,(_,c)=>{polls.push(c.trim());return`%%POLL_${polls.length-1}%%`});text=text.replace(/```game\n([\s\S]*?)```/g,(_,c)=>{games.push(c.trim());return`%%GAME_${games.length-1}%%`});const r=new marked.Renderer();r.code=function(code,lang){if(typeof code==='object'){lang=code.lang;code=code.text}const l=(lang||'text').toLowerCase();let h;try{h=lang&&hljs.getLanguage(lang)?hljs.highlight(code,{language:lang}).value:esc(code)}catch{h=esc(code)}return`<div class="cb"><div class="ch"><span>${esc(l)}</span><button class="ccb" onclick="copyCode(this)">Copy</button></div><pre><code>${h}</code></pre></div>`};let html=marked.parse(text,{renderer:r});mm.forEach((c,i)=>{html=html.replace(`%%MER_${i}%%`,`<pre class="mermaid-source" style="display:none">${esc(c)}</pre>`)});mcqs.forEach((c,i)=>{const p=parseMCQ(c);html=html.replace(`%%MCQ_${i}%%`,`<div class="mcq-block" data-question="${esc(p.q)}" data-options='${JSON.stringify(p.opts)}' data-correct="${p.correct}"></div>`)});polls.forEach((c,i)=>{const p=parsePoll(c);html=html.replace(`%%POLL_${i}%%`,`<div class="poll-block" data-question="${esc(p.q)}" data-options='${JSON.stringify(p.opts)}'></div>`)});games.forEach((c,i)=>{const p=parseGame(c);html=html.replace(`%%GAME_${i}%%`,`<div class="game-block" data-title="${esc(p.title)}" data-desc="${esc(p.desc)}" data-content="${esc(p.content)}"></div>`)});return html}
function parseMCQ(s){const ls=s.split('\n').filter(l=>l.trim());let q='',opts=[],correct=0;ls.forEach(l=>{if(l.startsWith('Q:'))q=l.slice(2).trim();else if(/^[A-D]\)/.test(l)){const o=l.slice(2).trim();const ic=o.includes('(correct)');opts.push(o.replace('(correct)','').trim());if(ic)correct=opts.length-1}});return{q,opts,correct}}
function parsePoll(s){const ls=s.split('\n').filter(l=>l.trim());let q='',opts=[];ls.forEach(l=>{if(l.startsWith('Q:'))q=l.slice(2).trim();else if(/^[A-Z]\)/.test(l))opts.push(l.slice(2).trim())});return{q,opts}}
function parseGame(s){const ls=s.split('\n');let title='Game',desc='',content='';ls.forEach(l=>{if(l.startsWith('TITLE:'))title=l.slice(6).trim();else if(l.startsWith('DESC:'))desc=l.slice(5).trim();else if(l.startsWith('CONTENT:'))content=l.slice(8).trim();else content+='\n'+l});return{title,desc,content:content.trim()}}
// Drawing
let dCtx,drawing=false,dTool='pen',dColor='#222',dHist=[];
function initCan(){const c=document.getElementById('drawCan');dCtx=c.getContext('2d');dCtx.fillStyle='#fff';dCtx.fillRect(0,0,c.width,c.height);dCtx.strokeStyle=dColor;dCtx.lineWidth=3;dCtx.lineCap='round';dCtx.lineJoin='round';dHist=[c.toDataURL()];let sx,sy,snap;const gp=e=>{const r=c.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}};const dn=e=>{e.preventDefault();drawing=true;const p=gp(e);sx=p.x;sy=p.y;if(dTool==='pen'||dTool==='eraser'){dCtx.beginPath();dCtx.moveTo(p.x,p.y)}snap=c.toDataURL()};const mv=e=>{if(!drawing)return;e.preventDefault();const p=gp(e);if(dTool==='pen'||dTool==='eraser'){dCtx.strokeStyle=dTool==='eraser'?'#fff':dColor;dCtx.lineTo(p.x,p.y);dCtx.stroke()}else{const img=new Image();img.onload=()=>{dCtx.clearRect(0,0,c.width,c.height);dCtx.drawImage(img,0,0);dCtx.strokeStyle=dColor;dCtx.beginPath();if(dTool==='line'){dCtx.moveTo(sx,sy);dCtx.lineTo(p.x,p.y)}else if(dTool==='rect')dCtx.rect(sx,sy,p.x-sx,p.y-sy);else if(dTool==='circle'){const rx=Math.abs(p.x-sx)/2,ry=Math.abs(p.y-sy)/2;dCtx.ellipse(sx+(p.x-sx)/2,sy+(p.y-sy)/2,rx,ry,0,0,Math.PI*2)}dCtx.stroke()};img.src=snap}};const up=()=>{if(!drawing)return;drawing=false;dHist.push(c.toDataURL())};c.onmousedown=dn;c.onmousemove=mv;c.onmouseup=up;c.onmouseleave=up;c.ontouchstart=dn;c.ontouchmove=mv;c.ontouchend=up}
function openDraw(){document.getElementById('drawOv').classList.add('show');initCan()}
function closeDraw(){document.getElementById('drawOv').classList.remove('show')}
function clearCan(){const c=document.getElementById('drawCan');dCtx.fillStyle='#fff';dCtx.fillRect(0,0,c.width,c.height);dHist=[c.toDataURL()]}
function undoDraw(){if(dHist.length>1){dHist.pop();const img=new Image();img.onload=()=>{dCtx.clearRect(0,0,560,380);dCtx.drawImage(img,0,0)};img.src=dHist[dHist.length-1]}}
function setDT(t,el){dTool=t;document.querySelectorAll('.dt').forEach(e=>e.classList.remove('active'));el.classList.add('active')}
function setDC(c,el){dColor=c;document.querySelectorAll('.cs').forEach(e=>e.classList.remove('active'));el.classList.add('active')}
function sendDraw(){document.getElementById('drawCan').toBlob(b=>{const r=new FileReader();r.onload=()=>{S.attachedImages.push({mime:'image/png',data:r.result.split(',')[1],name:'drawing.png'});renderIP();updS();closeDraw();toast('Drawing attached','success')};r.readAsDataURL(b)},'image/png')}
function setupInp(){const inp=document.getElementById('mainInput');if(!inp)return;inp.addEventListener('paste',e=>{const items=e.clipboardData?.items;if(!items)return;for(const it of items)if(it.type.startsWith('image/')){e.preventDefault();addImg(it.getAsFile())}});const area=document.getElementById('chatArea')||document.getElementById('contentArea');if(area){area.ondragover=e=>{e.preventDefault()};area.ondrop=e=>{e.preventDefault();for(const f of e.dataTransfer.files)if(f.type.startsWith('image/'))addImg(f)}}inp.focus()}
function autoG(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,200)+'px'}
function updS(){const b=document.getElementById('sendBtn'),i=document.getElementById('mainInput');if(b&&i)b.className='sendb'+((i.value.trim()||S.attachedImages.length)?' has':'')}
function hKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend()}}
function qp(c){const inp=document.getElementById('mainInput');if(!inp)return;inp.value={Write:'Help me write ',Code:'Write code for ',Quiz:'Give me a fun quiz about '}[c]||'';inp.focus();autoG(inp);updS()}
function mkCV(){const c={id:'c'+Date.now()+Math.random().toString(36).substr(2,4),title:'New chat',messages:[],starred:false,createdAt:Date.now(),updatedAt:Date.now()};S.conversations.unshift(c);save();return c}
function newChat(){if(S.isStreaming)return;S.incognito=false;S.incognitoConv=null;S.currentConvId=null;S.attachedImages=[];renderContent();renderSB();renderInc()}
function switchCV(id){if(S.isStreaming)return;S.incognito=false;S.incognitoConv=null;S.currentConvId=id;S.attachedImages=[];renderContent();renderSB();renderInc()}
function showCtx(e,id){e.preventDefault();S.contextConvId=id;const cv=S.conversations.find(c=>c.id===id);document.getElementById('starLbl').textContent=cv?.starred?'★ Unstar':'⭐ Star';const m=document.getElementById('ctxMenu');m.style.left=e.clientX+'px';m.style.top=e.clientY+'px';m.classList.add('show');setTimeout(()=>document.addEventListener('click',()=>m.classList.remove('show'),{once:true}),0)}
function renameC(){document.getElementById('ctxMenu').classList.remove('show');const c=S.conversations.find(x=>x.id===S.contextConvId);if(!c)return;const n=prompt('Rename:',c.title);if(n?.trim()){c.title=n.trim();save();renderSB();if(S.currentConvId===c.id)document.getElementById('tbtText').textContent=c.title}}
function starC(){document.getElementById('ctxMenu').classList.remove('show');const c=S.conversations.find(x=>x.id===S.contextConvId);if(c){c.starred=!c.starred;save();renderSB()}}
function delC(){document.getElementById('ctxMenu').classList.remove('show');const i=S.conversations.findIndex(x=>x.id===S.contextConvId);if(i<0)return;S.conversations.splice(i,1);if(S.currentConvId===S.contextConvId){S.currentConvId=null;renderContent()}save();renderSB()}
function editTitle(){const cv=S.incognito?S.incognitoConv:S.conversations.find(c=>c.id===S.currentConvId);if(!cv)return;const n=prompt('Rename:',cv.title);if(n?.trim()){cv.title=n.trim();if(!S.incognito)save();renderSB();document.getElementById('tbtText').textContent=cv.title}}
function retryMsg(idx){const cv=S.incognito?S.incognitoConv:S.conversations.find(c=>c.id===S.currentConvId);if(!cv||S.isStreaming)return;const ut=(cv.messages[cv.messages.length-1]||{}).text||'';cv.messages.splice(idx);if(!S.incognito)save();renderChat();setTimeout(()=>streamR(cv,ut),100)}
function toggleSearch(){document.getElementById('searchOv').classList.toggle('show');if(document.getElementById('searchOv').classList.contains('show')){document.getElementById('searchInp').value='';document.getElementById('searchInp').focus();filterC()}}
function filterC(){const q=document.getElementById('searchInp').value.toLowerCase();const r=S.conversations.filter(c=>c.title.toLowerCase().includes(q)||c.messages.some(m=>(m.text||'').toLowerCase().includes(q)));document.getElementById('searchRes').innerHTML=r.length?r.map(c=>`<div class="ci" onclick="switchCV('${c.id}');toggleSearch()"><span class="ci-t">${esc(c.title)}</span></div>`).join(''):'<div style="padding:16px;text-align:center;color:var(--text-muted)">No results</div>'}
function addImg(f){if(!f.type.startsWith('image/'))return;const r=new FileReader();r.onload=()=>{S.attachedImages.push({mime:f.type,data:r.result.split(',')[1],name:f.name});renderIP();updS()};r.readAsDataURL(f)}
function handleFS(e){for(const f of e.target.files)addImg(f);e.target.value=''}
function removeImg(i){S.attachedImages.splice(i,1);renderIP();updS()}
function renderIP(){const c=document.getElementById('imgPrev');if(!c)return;c.innerHTML=S.attachedImages.map((img,i)=>`<div class="ipv"><img src="data:${img.mime};base64,${img.data}"><button class="rx" onclick="removeImg(${i})">✕</button></div>`).join('')}
function showLB(src){const l=document.createElement('div');l.className='lb';l.innerHTML=`<img src="${src}">`;l.onclick=()=>l.remove();document.body.appendChild(l)}
function selM(id){S.activeModel=id;save();closeMD();const l=document.getElementById('mLabel');if(l)l.textContent=getMN(id);refMD()}
function togTh(){S.settings.extendedThinking=!S.settings.extendedThinking;save();refMD();const p=document.getElementById('mLabel')?.parentElement;if(!p)return;const ex=p.querySelector('.ext-b');if(S.settings.extendedThinking&&!ex){const s=document.createElement('span');s.className='ext-b';s.textContent='Extended';p.insertBefore(s,document.getElementById('mLabel').nextSibling)}else if(!S.settings.extendedThinking&&ex)ex.remove()}
function togMM(){const l=document.getElementById('mmL');if(l)l.classList.toggle('show');const a=document.getElementById('mA');if(a)a.textContent=l?.classList.contains('show')?'∨':'›'}
function refMD(){const d=document.getElementById('mDrop');if(d)d.innerHTML=mdHTML()}
function getMN(id){const m=S.availableModels.find(x=>x.id===id);return m?m.name:id||'Select'}
function setStyle(id){S.settings.style=id;save();closeDD();toast(`Style: ${STYLES.find(s=>s.id===id)?.name}`,'success')}
function toggleSS(){document.getElementById('styleSub')?.classList.toggle('show')}
function togglePM(e){e.stopPropagation();const m=document.getElementById('plusMenu');if(!m)return;const o=m.classList.contains('show');closeDD();if(!o){m.innerHTML=pmHTML();m.classList.add('show')}}
function toggleMD(e){e.stopPropagation();const d=document.getElementById('mDrop');if(!d)return;const o=d.classList.contains('show');closeDD();if(!o){d.innerHTML=mdHTML();d.classList.add('show')}}
function closeMD(){document.getElementById('mDrop')?.classList.remove('show')}
function togglePF(e){e.stopPropagation();const f=document.getElementById('pFlyout');const o=f.classList.contains('show');closeDD();if(!o)f.classList.add('show')}
function closeDD(){document.querySelectorAll('.pmenu,.mdd,.pflyout,.ssub').forEach(e=>e.classList.remove('show'))}
document.addEventListener('click',e=>{if(!e.target.closest('.pmenu')&&!e.target.closest('.plusb'))document.getElementById('plusMenu')?.classList.remove('show');if(!e.target.closest('.mdd')&&!e.target.closest('.mba'))closeMD();if(!e.target.closest('.pflyout')&&!e.target.closest('.sprofile'))document.getElementById('pFlyout')?.classList.remove('show')})
function toggleSB(){document.getElementById('sidebar').classList.toggle('collapsed')}
function openSet(){closeDD();document.getElementById('setOv').classList.add('show');sTab('general',document.querySelector('.stb[data-t="general"]'))}
function closeSet(){document.getElementById('setOv').classList.remove('show');renderApp()}
function sTab(tab,el){document.querySelectorAll('.stb').forEach(t=>t.classList.remove('active'));el?.classList.add('active');const c=document.getElementById('setCont');switch(tab){
case'general':c.innerHTML=`<div class="sg"><h3>Profile</h3><div class="sf"><label>Username</label><input type="text" value="${esc(S.settings.username)}" onchange="S.settings.username=this.value;save()"></div></div><div class="sg"><h3>Theme</h3><div class="sf"><label>Theme</label><select onchange="applyTheme(this.value)"><option value="dark" ${S.settings.theme==='dark'?'selected':''}>Dark</option><option value="light" ${S.settings.theme==='light'?'selected':''}>Light</option><option value="amoled" ${S.settings.theme==='amoled'?'selected':''}>AMOLED</option><option value="system" ${S.settings.theme==='system'?'selected':''}>System</option></select></div></div><div class="sg"><h3>Style</h3><div style="display:flex;flex-direction:column;gap:6px">${STYLES.map(s=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid ${s.id===S.settings.style?'var(--accent)':'var(--border)'};border-radius:10px;cursor:pointer;${s.id===S.settings.style?'background:rgba(212,165,116,.08)':''}" onclick="S.settings.style='${s.id}';save();sTab('general',document.querySelector('.stb[data-t=general]'))"><span style="font-size:16px;width:22px;text-align:center">${s.icon}</span><div style="flex:1;font-weight:500">${s.name}</div>${s.id===S.settings.style?'<span style="color:var(--accent)">✓</span>':''}</div>`).join('')}</div></div>`;break;
case'account':c.innerHTML=`<div class="sg"><h3>API Key</h3><div style="display:flex;gap:10px;align-items:center"><div style="padding:8px 12px;border-radius:8px;background:var(--input-bg);border:1px solid var(--border);font-family:monospace;font-size:13px;color:var(--text-muted)">${S.apiKey?S.apiKey.substring(0,8)+'••••'+S.apiKey.slice(-4):'Not set'}</div><button class="btn bs" style="padding:6px 14px;font-size:13px" onclick="closeSet();showKeyModal()">Change</button></div></div>`;break;
case'instructions':c.innerHTML=`<div class="sg"><h3>Custom Instructions</h3><p>Background context for the AI. Won't override capabilities.</p><textarea class="cita" id="ciInp" placeholder="e.g., I'm a developer...">${esc(S.settings.customInstructions||'')}</textarea><div style="margin-top:12px;display:flex;gap:8px"><button class="btn bp" onclick="S.settings.customInstructions=document.getElementById('ciInp').value;save();toast('Saved!','success')">Save</button><button class="btn bs" onclick="document.getElementById('ciInp').value='';S.settings.customInstructions='';save();toast('Cleared','info')">Clear</button></div></div>`;break;
case'skills':renderSkillsTab(c);break;
case'personas':c.innerHTML=`<div class="sg"><h3>Custom Claudes</h3><p>Create AI personas. They appear in sidebar.</p><div style="padding:16px;border-radius:12px;border:1px solid var(--border);margin-bottom:16px"><div class="sf"><label>Name</label><input type="text" id="pNameI" placeholder="Code Reviewer"></div><div style="margin-bottom:12px"><label style="font-size:14px;color:var(--text-muted);display:block;margin-bottom:6px">Instructions</label><textarea class="cita" id="pInstI" placeholder="You are a senior code reviewer..."></textarea></div><button class="btn bp" onclick="addP()">Create</button></div>${S.personas.length?`<div class="ccg">${S.personas.map(p=>`<div class="ccc ${p.id===S.settings.activePersona?'active':''}" onclick="actPersona('${p.id}');sTab('personas',document.querySelector('.stb[data-t=personas]'))"><h4>${p.icon||'🤖'} ${esc(p.name)}</h4><p>${esc(p.instructions.substring(0,80))}</p><button class="cdl" onclick="event.stopPropagation();delP('${p.id}')">✕</button></div>`).join('')}</div>`:''}</div>`;break;
case'capabilities':c.innerHTML=`<div class="sg"><h3>Models</h3><button class="btn bs" onclick="closeSet();showPickModal()">Re-select</button></div><div class="sg"><h3>Extended Thinking</h3><div style="display:flex;align-items:center;justify-content:space-between"><div><strong>Default on</strong></div><div class="tog ${S.settings.extendedThinking?'on':''}" onclick="S.settings.extendedThinking=!S.settings.extendedThinking;save();this.classList.toggle('on')"></div></div></div>`;break;
case'master':c.innerHTML=`<div class="sg"><h3>🔴 Master Controls</h3><p>Cannot be undone.</p><div style="display:flex;flex-direction:column;gap:12px"><button class="btn bd" style="width:fit-content" onclick="if(confirm('Delete ALL chats?')){S.conversations=[];S.currentConvId=null;save();toast('Cleared','success');renderSB();renderContent()}">🗑️ Clear all chats</button><button class="btn bd" style="width:fit-content" onclick="if(confirm('Delete ALL Custom Claudes?')){S.personas=[];S.settings.activePersona=null;save();toast('Deleted','success');renderPSB();sTab('master',document.querySelector('.stb[data-t=master]'))}">🤖 Delete all Claudes</button><button class="btn bd" style="width:fit-content" onclick="if(confirm('Delete ALL skills?')){S.skills=[];save();toast('Deleted','success');sTab('master',document.querySelector('.stb[data-t=master]'))}">🧩 Delete all skills</button><button class="btn bd" style="width:fit-content" onclick="resetApp()">💣 Reset entire app</button></div></div>`;break;
}}
function renderSkillsTab(c){
  c.innerHTML=`<div class="sg"><h3>Skills</h3><p>Add custom knowledge guides that teach the AI specialized techniques — like drawing chemical reactions, rendering specific diagram types, or following domain-specific conventions. Toggle skills on/off as needed.</p>
  <div style="padding:16px;border-radius:12px;border:1px solid var(--border);margin-bottom:20px">
    <div class="sf"><label>Name</label><input type="text" id="skNameI" placeholder="e.g., Circuit Diagrams"></div>
    <div class="sf"><label>Icon</label><input type="text" id="skIconI" placeholder="e.g., ⚡" style="width:80px" maxlength="2"></div>
    <div style="margin-bottom:12px"><label style="font-size:14px;color:var(--text-muted);display:block;margin-bottom:6px">Guide / Instructions</label><textarea class="cita" id="skInstI" placeholder="When asked to draw circuits: use standard IEEE symbols. Resistors as zigzag lines. Capacitors as parallel plates. Label all components with values..."></textarea></div>
    <button class="btn bp" onclick="addSkill()">Add Skill</button>
  </div>
  <h3 style="margin-bottom:12px">${S.skills.length} skill${S.skills.length!==1?'s':''}</h3>
  ${S.skills.map((sk,i)=>`<div class="skill-card">
    <div class="sk-icon">${sk.icon||'🧩'}</div>
    <div class="sk-body"><div class="sk-name">${esc(sk.name)}${sk.builtin?' <span style="font-size:10px;color:var(--text-muted);font-weight:400">(built-in)</span>':''}</div><div class="sk-desc">${esc(sk.desc||sk.prompt.substring(0,100))}</div></div>
    <div class="sk-tog"><div class="tog ${sk.enabled?'on':''}" onclick="toggleSkill(${i})"></div></div>
    <div class="sk-del" onclick="delSkill(${i})">✕</div>
  </div>`).join('')}
  </div>`;
}
function addSkill(){const name=document.getElementById('skNameI')?.value.trim();const icon=document.getElementById('skIconI')?.value.trim()||'🧩';const inst=document.getElementById('skInstI')?.value.trim();if(!name||!inst)return toast('Fill name and instructions','error');S.skills.push({id:'sk_'+Date.now(),name,icon,desc:inst.substring(0,120),prompt:inst,enabled:true,builtin:false});save();toast(`Skill "${name}" added!`,'success');renderSkillsTab(document.getElementById('setCont'))}
function toggleSkill(i){if(S.skills[i]){S.skills[i].enabled=!S.skills[i].enabled;save();renderSkillsTab(document.getElementById('setCont'))}}
function delSkill(i){if(!confirm('Delete this skill?'))return;S.skills.splice(i,1);save();toast('Deleted','success');renderSkillsTab(document.getElementById('setCont'))}
function addP(){const name=document.getElementById('pNameI')?.value.trim();const inst=document.getElementById('pInstI')?.value.trim();if(!name||!inst)return toast('Fill all fields','error');const icons=['🤖','🧠','📝','💻','🎨','🔬','📊','🎯','🧑‍🏫','🧑‍💻'];S.personas.push({id:'p'+Date.now(),name,instructions:inst,icon:icons[Math.floor(Math.random()*icons.length)]});save();toast(`${name} created!`,'success');renderPSB();sTab('personas',document.querySelector('.stb[data-t=personas]'))}
function delP(id){if(!confirm('Delete?'))return;S.personas=S.personas.filter(p=>p.id!==id);if(S.settings.activePersona===id)S.settings.activePersona=null;save();toast('Deleted','success');renderPSB();sTab('personas',document.querySelector('.stb[data-t=personas]'))}
function resetApp(){if(!confirm('Delete ALL data?'))return;if(!confirm('Sure?'))return;localStorage.clear();location.reload()}
function copyConv(){const cv=S.incognito?S.incognitoConv:S.conversations.find(c=>c.id===S.currentConvId);if(!cv)return;navigator.clipboard.writeText(cv.messages.map(m=>`${m.role==='user'?'You':'AI'}: ${m.text}`).join('\n\n')).then(()=>toast('Copied','success'))}
function scrollB(){const a=document.getElementById('chatArea');if(a)requestAnimationFrame(()=>a.scrollTop=a.scrollHeight)}
function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function toast(m,t='info'){const c=document.getElementById('tc'),d=document.createElement('div');d.className=`toast ${t}`;d.textContent=m;c.appendChild(d);setTimeout(()=>{d.style.opacity='0';d.style.transition='opacity .3s';setTimeout(()=>d.remove(),300)},4e3)}
function copyCode(btn){const code=btn.closest('.cb').querySelector('code').textContent;navigator.clipboard.writeText(code).then(()=>{btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',2e3)})}
function copyMsg(idx){const cv=S.incognito?S.incognitoConv:S.conversations.find(c=>c.id===S.currentConvId);if(cv?.messages[idx]){const{clean}=parseFU(cv.messages[idx].text||'');navigator.clipboard.writeText(clean).then(()=>toast('Copied','success'))}}
init();
</script>
